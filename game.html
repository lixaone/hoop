<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoopShot — Играть</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5A1F;
    --dark: #0D0D0D;
    --cream: #F5EDD8;
    --text-muted: #7a6a55;
    --accent: #FFD166;
    --green: #06D6A0;
    --red: #EF476F;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.35;
  }

  /* ─── TOP BAR ─── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(245,237,216,0.07);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--orange);
    text-decoration: none;
  }
  .logo span { color: var(--cream); }

  .hud {
    display: flex;
    gap: 36px;
    align-items: center;
  }

  .hud-item {
    text-align: center;
  }

  .hud-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .hud-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--cream);
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  #timer-val { color: var(--orange); }
  #timer-val.low { color: var(--red); animation: pulse-red 0.5s ease infinite alternate; }

  #combo-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: var(--accent);
    min-width: 80px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #combo-display.show { opacity: 1; }

  .back-btn {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--cream); }

  /* ─── CANVAS ─── */
  #gameCanvas {
    display: block;
    margin: 56px auto 0;
    cursor: crosshair;
  }

  /* ─── OVERLAYS ─── */
  .overlay {
    position: fixed;
    inset: 56px 0 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(16px);
    z-index: 10000;
    text-align: center;
  }

  .overlay h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.05em;
    color: var(--cream);
    margin-bottom: 12px;
  }

  .overlay h2 em {
    font-style: normal;
    color: var(--orange);
  }

  .overlay p {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 36px;
    max-width: 420px;
    line-height: 1.6;
  }

  .big-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 12vw, 9rem);
    color: var(--orange);
    text-shadow: 0 0 60px rgba(255,90,31,0.5);
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  .play-btn {
    background: var(--orange);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    padding: 16px 52px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(255,90,31,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .play-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(255,90,31,0.6); }
  .play-btn:active { transform: translateY(0); }

  /* ─── POPUP SCORE ─── */
  #score-popup {
    position: fixed;
    pointer-events: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(255,209,102,0.6);
    z-index: 300;
    opacity: 0;
    transition: none;
  }

  /* ─── INSTRUCTIONS ─── */
  #instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    z-index: 50;
    pointer-events: none;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes pulse-red {
    from { color: var(--red); }
    to   { color: #ff8080; }
  }

  @keyframes score-float {
    0%   { opacity: 1;   transform: translateY(0) scale(1); }
    80%  { opacity: 1;   transform: translateY(-70px) scale(1.2); }
    100% { opacity: 0;   transform: translateY(-100px) scale(0.9); }
  }

  @keyframes combo-bump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <a href="index.html" class="logo">Hoop<span>Shot</span></a>
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">Очки</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div id="combo-display">🔥 КОМБО x<span id="combo-num">1</span></div>
    <div class="hud-item">
      <div class="hud-label">Время</div>
      <div class="hud-value" id="timer-val">30</div>
    </div>
  </div>
  <a href="index.html" class="back-btn">← На главную</a>
</div>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- Instructions -->
<div id="instructions">Зажми и потяни мышкой для броска</div>

<!-- Score Popup -->
<div id="score-popup"></div>

<!-- Start Overlay -->
<div class="overlay" id="startOverlay">
  <h2>ГОТОВ<br>К <em>БРОСКУ?</em></h2>
  <p>Зажми на мяче, выбери направление и отпусти.<br>30 секунд — набери максимум очков!</p>
  <button class="play-btn" id="startBtn">🏀 НАЧАТЬ</button>
</div>

<!-- End Overlay -->
<div class="overlay" id="endOverlay" style="display:none">
  <h2>ВРЕМЯ<br><em>ВЫШЛО!</em></h2>
  <div class="big-score" id="final-score">0</div>
  <div class="score-label">Очков набрано</div>
  <button class="play-btn" id="restartBtn">🔄 ЕЩЁ РАЗ</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── RESIZE ──
function resize() {
  const topH = 56;
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - topH;
}
resize();
window.addEventListener('resize', () => { resize(); resetBall(); });

// ── STATE ──
let score     = 0;
let combo     = 0;
let timeLeft  = 30;
let gameActive = false;
let timerID   = null;
let animID    = null;

// ── BALL ──
let ball = {};
let isDragging = false;
let dragStart  = { x: 0, y: 0 };
let dragNow    = { x: 0, y: 0 };

function resetBall() {
  ball = {
    x:  canvas.width  * 0.15 + 30,
    y:  canvas.height * 0.78,
    r:  24,
    vx: 0,
    vy: 0,
    flying: false,
    rotation: 0,
  };
}

// ── HOOP ──
let hoop = {};
let hoopDir   = 1;
let hoopSpeed = 0;

function resetHoop() {
  hoop = {
    x:   canvas.width  * 0.65,
    y:   canvas.height * 0.35,
    rimW: 46,
    rimH: 10,
  };
  hoopSpeed = 0.6 + Math.random() * 0.5;
}

// ── PARTICLES ──
let particles = [];
function spawnParticles(x, y, color) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r:  3 + Math.random() * 4,
      life: 1,
      decay: 0.025 + Math.random() * 0.025,
      color,
    });
  }
}

// ── SCORING ──
function addScore(val) {
  const mul  = Math.min(combo, 3);
  const pts  = val * (mul || 1);
  score     += pts;
  document.getElementById('score-val').textContent = score;
  showScorePopup('+' + pts, ball.x + canvas.getBoundingClientRect().left, ball.y + 56);
}

function showScorePopup(text, px, py) {
  const el = document.getElementById('score-popup');
  el.textContent = text;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';
  el.style.opacity = '1';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'score-float 0.9s ease forwards';
}

function updateComboUI() {
  const el  = document.getElementById('combo-display');
  const num = document.getElementById('combo-num');
  if (combo >= 2) {
    num.textContent = combo;
    el.classList.add('show');
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'combo-bump 0.3s ease';
  } else {
    el.classList.remove('show');
  }
}

// ── TIMER ──
function startTimer() {
  clearInterval(timerID);
  timerID = setInterval(() => {
    timeLeft--;
    const tv = document.getElementById('timer-val');
    tv.textContent = timeLeft;
    if (timeLeft <= 10) tv.classList.add('low'); else tv.classList.remove('low');
    if (timeLeft <= 0) endGame();
  }, 1000);
}

// ── PHYSICS ──
const GRAVITY  = 0.38;
const FRICTION = 0.995;
let scored   = false; // flag per throw

function checkHoopCollision() {
  if (!ball.flying) return;

  const left  = hoop.x - hoop.rimW;
  const right = hoop.x + hoop.rimW;
  const cy    = hoop.y;

  // Ball passes through rim zone (top to bottom)
  const ballBot = ball.y + ball.r;
  const ballTop = ball.y - ball.r;

  if (!scored && ball.vy > 0) {
    // Center-ish pass through
    if (ball.x > left + 6 && ball.x < right - 6 &&
        ballTop <= cy + 14 && ballBot >= cy - 6) {
      scored = true;
      combo++;
      spawnParticles(ball.x, ball.y, '#FF8C42');
      addScore(10);
      updateComboUI();
    }
  }

  // Rim bounce (ball hits rim edge)
  const hitLeft  = Math.abs(ball.x - left)  < ball.r + 6 && Math.abs(ball.y - cy) < ball.r + 14;
  const hitRight = Math.abs(ball.x - right) < ball.r + 6 && Math.abs(ball.y - cy) < ball.r + 14;

  if (hitLeft || hitRight) {
    ball.vx *= -0.45;
    ball.vy *= -0.45;
    ball.x  += ball.vx * 2;
  }
}

// ── DRAW ──
function drawCourt() {
  // Background gradient
  const gh = ctx.createLinearGradient(0, canvas.height * 0.5, 0, canvas.height);
  gh.addColorStop(0, 'rgba(196,124,43,0.04)');
  gh.addColorStop(1, 'rgba(196,124,43,0.14)');
  ctx.fillStyle = gh;
  ctx.fillRect(0, canvas.height * 0.5, canvas.width, canvas.height * 0.5);

  // Floor line
  ctx.strokeStyle = 'rgba(245,237,216,0.08)';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height * 0.88);
  ctx.lineTo(canvas.width, canvas.height * 0.88);
  ctx.stroke();

  // Key paint
  ctx.strokeStyle = 'rgba(245,237,216,0.05)';
  ctx.lineWidth   = 1.5;
  ctx.strokeRect(hoop.x - 90, hoop.y, 180, canvas.height * 0.88 - hoop.y);
}

function drawBackboard() {
  const bx = hoop.x + hoop.rimW + 14;
  const by = hoop.y - 60;
  const bw = 16, bh = 90;

  // Pole
  ctx.fillStyle = 'rgba(245,237,216,0.15)';
  ctx.fillRect(bx + 4, by + bh, 8, canvas.height - by - bh);

  // Board
  ctx.fillStyle = 'rgba(245,237,216,0.1)';
  ctx.strokeStyle = 'rgba(245,237,216,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 2);
  ctx.fill();
  ctx.stroke();

  // Target square
  ctx.strokeStyle = 'rgba(255,90,31,0.5)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx + 2, by + 20, bw - 4, 32);
}

function drawHoop() {
  const cx = hoop.x;
  const cy = hoop.y;
  const rw = hoop.rimW;

  // Net
  const netPts = 10;
  const netBot = cy + 55;
  ctx.strokeStyle = 'rgba(245,237,216,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= netPts; i++) {
    const t  = i / netPts;
    const nx = cx - rw + rw * 2 * t;
    const sag = Math.sin(t * Math.PI) * 10;
    ctx.beginPath();
    ctx.moveTo(nx, cy);
    ctx.bezierCurveTo(nx - 4 + sag, cy + 18, nx + 4 - sag, cy + 38, nx + (t - 0.5) * 10, netBot);
    ctx.stroke();
  }
  // Horizontal net lines
  for (let j = 1; j <= 3; j++) {
    const t2 = j / 4;
    const ny = cy + t2 * 55;
    const nw = rw * (1 - t2 * 0.5);
    ctx.beginPath();
    ctx.moveTo(cx - nw, ny);
    ctx.lineTo(cx + nw, ny);
    ctx.stroke();
  }

  // Rim shadow
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6, rw, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Rim
  const rimGrad = ctx.createLinearGradient(cx - rw, cy - 5, cx + rw, cy + hoop.rimH);
  rimGrad.addColorStop(0, '#FF5A1F');
  rimGrad.addColorStop(0.4, '#FF8C42');
  rimGrad.addColorStop(1, '#C94A00');

  ctx.beginPath();
  ctx.ellipse(cx, cy, rw, hoop.rimH / 2, 0, 0, Math.PI * 2);
  ctx.strokeStyle = rimGrad;
  ctx.lineWidth   = 5;
  ctx.stroke();

  // Rim shine
  ctx.beginPath();
  ctx.ellipse(cx, cy - 2, rw * 0.6, hoop.rimH * 0.3, 0, Math.PI, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth   = 2;
  ctx.stroke();
}

function drawBall() {
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.rotation);

  // Shadow when grounded
  if (!ball.flying) {
    const sx = 0, sy = canvas.height * 0.88 - ball.y + 8;
    ctx.beginPath();
    ctx.ellipse(sx, sy, ball.r * 1.2, 6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();
  }

  // Ball body
  const bGrad = ctx.createRadialGradient(-8, -10, 2, 0, 0, ball.r);
  bGrad.addColorStop(0, '#FF8C42');
  bGrad.addColorStop(0.5, '#E85E1A');
  bGrad.addColorStop(1, '#7A2A00');
  ctx.beginPath();
  ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = bGrad;
  ctx.fill();

  // Seams
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.8;

  ctx.beginPath();
  ctx.arc(0, 0, ball.r, 0, Math.PI);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, ball.r, Math.PI / 2, -Math.PI / 2);
  ctx.stroke();

  // Curved seams
  ctx.beginPath();
  ctx.moveTo(-ball.r * 0.4, -ball.r * 0.9);
  ctx.bezierCurveTo(-ball.r * 1.2, 0, -ball.r * 1.2, 0, -ball.r * 0.4, ball.r * 0.9);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ball.r * 0.4, -ball.r * 0.9);
  ctx.bezierCurveTo(ball.r * 1.2, 0, ball.r * 1.2, 0, ball.r * 0.4, ball.r * 0.9);
  ctx.stroke();

  // Shine
  ctx.beginPath();
  ctx.arc(-7, -9, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fill();

  ctx.restore();
}

function drawArrow() {
  if (!isDragging || ball.flying) return;

  const dx   = dragStart.x - dragNow.x;
  const dy   = dragStart.y - dragNow.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 10) return;

  const maxDist = 180;
  const t = Math.min(dist / maxDist, 1);

  const ex = ball.x + dx * 2.2;
  const ey = ball.y + dy * 2.2;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y);
  ctx.lineTo(ex, ey);

  // Gradient arrow
  const arrowGrad = ctx.createLinearGradient(ball.x, ball.y, ex, ey);
  arrowGrad.addColorStop(0, `rgba(255,90,31,${t * 0.8})`);
  arrowGrad.addColorStop(1, `rgba(255,209,102,${t * 0.3})`);

  ctx.strokeStyle = arrowGrad;
  ctx.lineWidth   = 3;
  ctx.setLineDash([8, 5]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  const angle = Math.atan2(ey - ball.y, ex - ball.x);
  ctx.translate(ex, ey);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-14, -6);
  ctx.lineTo(-14, 6);
  ctx.closePath();
  ctx.fillStyle = `rgba(255,209,102,${t * 0.7})`;
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── GAME LOOP ──
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCourt();
  drawBackboard();
  drawHoop();
  drawArrow();
  drawBall();
  drawParticles();

  if (gameActive) {
    // Move hoop
    hoop.x += hoopDir * hoopSpeed;
    if (hoop.x > canvas.width * 0.82 || hoop.x < canvas.width * 0.3) {
      hoopDir *= -1;
      hoopSpeed = 0.6 + Math.random() * (0.5 + (30 - timeLeft) * 0.015);
    }

    // Physics
    if (ball.flying) {
      ball.vx *= FRICTION;
      ball.vy += GRAVITY;
      ball.x  += ball.vx;
      ball.y  += ball.vy;
      ball.rotation += ball.vx * 0.05;

      checkHoopCollision();

      // Floor bounce
      const floor = canvas.height * 0.88;
      if (ball.y + ball.r >= floor) {
        ball.y  = floor - ball.r;
        ball.vy *= -0.35;
        ball.vx *= 0.7;
        if (Math.abs(ball.vy) < 1) {
          ball.flying = false;
          ball.vx = 0; ball.vy = 0;
          combo = 0;
          updateComboUI();
          setTimeout(() => resetBall(), 300);
        }
      }

      // Wall bounce
      if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx *= -0.5; }
      if (ball.x + ball.r >= canvas.width) { ball.x = canvas.width - ball.r; ball.vx *= -0.5; }
    }

    // Update particles
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.15;
      p.life -= p.decay;
      p.r   *= 0.97;
    }
  }

  animID = requestAnimationFrame(gameLoop);
}

// ── INPUT ──
function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function isOnBall(pos) {
  const dx = pos.x - ball.x;
  const dy = pos.y - ball.y;
  return Math.sqrt(dx * dx + dy * dy) <= ball.r + 20;
}

canvas.addEventListener('mousedown', e => {
  if (!gameActive || ball.flying) return;
  const pos = getPos(e, canvas);
  if (isOnBall(pos)) {
    isDragging = true;
    dragStart  = pos;
    dragNow    = pos;
  }
});

canvas.addEventListener('mousemove', e => {
  if (isDragging) dragNow = getPos(e, canvas);
});

canvas.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const pos = getPos(e, canvas);
  const dx  = dragStart.x - pos.x;

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameActive || ball.flying) return;
  const pos = getPos(e, canvas);
  if (isOnBall(pos)) {
    isDragging = true;
    dragStart = pos;
    dragNow = pos;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (isDragging) dragNow = getPos(e, canvas);
}, { passive: false });

    ball.vy = dy * 0.22 * power;
    ball.flying = true;
    scored = false;
  }
}, { passive: false });
